<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valentine</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8cdda, #fbc2eb);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .emoji {
            font-size: 60px;
        }

        .buttons {
            margin-top: 30px;
            position: relative;
            height: 80px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            position: absolute;
        }

        .yes {
            background: #ff4d6d;
            color: white;
            left: 60px;
        }

        .no {
            background: #ddd;
            right: 60px;
        }

        small {
            display: block;
            margin-top: 50px;
            color: #777;
        }

        /* Celebration screen */
        .celebration {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            text-align: center;
        }

        .celebration img {
            width: 220px;
            margin-top: 20px;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 55px;
            background: red;
            border-radius: 50%;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="emoji">🐱❤️</div>
    <h2>Naserian Faith will you be my valentine?</h2>

    <div class="buttons">
        <button class="yes" onclick="celebrate()">Yes</button>
        <button class="no" id="noBtn">No</button>
    </div>

    <small>"No" seems a bit shy 🫣</small>
</div>

<!-- Celebration -->
<div class="celebration" id="celebration">
    <h1>🎉 YAAAAY!!! 🎉</h1>
    <h2>Best Valentine Ever 💖</h2>

    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="Excited GIF">
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 200 - 100;
        const y = Math.random() * 60 - 30;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });

    function celebrate() {
        document.getElementById("card").style.display = "none";
        document.getElementById("celebration").style.display = "flex";

        // Create balloons
        for (let i = 0; i < 20; i++) {
            const balloon = document.createElement("div");
            balloon.className = "balloon";
            balloon.style.left = Math.random() * 100 + "vw";
            balloon.style.background =
                `hsl(${Math.random() * 360}, 70%, 60%)`;
            balloon.style.animationDuration =
                (Math.random() * 3 + 4) + "s";

            document.body.appendChild(balloon);
        }
    }
</script>

</body>
</html>
